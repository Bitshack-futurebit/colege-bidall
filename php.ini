; BidAll Custom PHP Configuration
; Upload this file to your server root directory (same level as public_html)
; For Xneelo shared hosting, place in: /home/bidalujwfq/

; Image Upload Limits (for phone camera support)
upload_max_filesize = 16M
post_max_size = 32M
memory_limit = 256M

; Execution Time (for image processing)
max_execution_time = 300
max_input_time = 300

; File Upload Settings
file_uploads = On
max_file_uploads = 20

; Error Reporting (for production)
display_errors = Off
log_errors = On
error_log = /home/bidalujwfq/logs/php_errors.log
